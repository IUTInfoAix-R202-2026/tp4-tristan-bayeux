# GitHub Classroom autograding workflow.
# Le bloc autograding (steps Classroom + reporter) est régénéré par
# update-autograding.sh en fonction des sous-paquets d'exercices
# détectés. Ne pas éditer à la main le bloc entre marqueurs.
name: GitHub Classroom Workflow

# Le calcul de note ne tourne que sur main : un exercice n'est livré qu'au
# moment du merge. Les pushes sur les feature branches (exerciceN) restent
# couverts par maven.yml (compilation + tests), qui suffit pour le feedback
# pédagogique. workflow_dispatch reste dispo pour un regrade manuel.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

# Sérialise les runs de notation d'une même ref. Sans ça, plusieurs pushes/merges
# rapprochés (ex. fusionner 6 PR en < 2 min) lancent des runs concurrents qui se
# marchent dessus sur le cache des rapports Surefire (read-modify-write) : chaque
# run restaure l'instantané le plus récent AU MOMENT de son démarrage, puis le
# réécrit À LA FIN. Comme les runs se chevauchent, le « dernier qui écrit »
# republie un instantané périmé où les rapports d'exercices traités en parallèle
# manquent ou sont restés `skipped` -> ces exercices sont notés 0 à tort.
# En sérialisant, chaque run restaure le cache COMPLET du run précédent.
concurrency:
  group: autograding-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Autograding
    if: github.repository != 'IUTInfoAix-R202/template-tp-javafx'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Historique complet pour que `git diff $BEFORE..HEAD` fonctionne
          # dans le step de scope (sans ça, on tomberait sur ALL à chaque push).
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
          # JavaFX 26 vient des deps Maven org.openjfx ; la Headless Platform
          # (glass.platform=Headless) est 100 % logicielle, pas besoin de jdk+fx.
          cache: maven

      #@@@AUTOGRADING-BEGIN@@@ (généré par update-autograding.sh, ne pas éditer à la main)
      - name: Compilation
        id: compilation
        uses: IUTInfoAix-R202/autograding-command-grader@main
        with:
          test-name: Compilation
          setup-command: ""
          command: ./mvnw -B -q compile
          timeout: 5
          max-score: 100

      - name: Restaurer le cache des rapports Surefire
        id: surefire_cache
        uses: actions/cache/restore@v5
        with:
          path: target/surefire-reports
          key: surefire-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            surefire-${{ github.ref_name }}-
            surefire-main-

      - name: Détecter les exercices impactés
        id: scope
        run: |
          set +e
          BEFORE="${{ github.event.before }}"
          # Cache vide (premier run, expiration GHA) -> regrade complet sinon les
          # XMLs absents donneraient un score 0 à tout le monde.
          if [ ! -d target/surefire-reports ] || [ -z "$(ls -A target/surefire-reports 2>/dev/null)" ]; then
            echo "filter=ALL" >> "$GITHUB_OUTPUT"
            echo "reason=cache des rapports absent ou expiré" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Premier push sur la branche, ou commit base introuvable -> tout regrader
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            echo "filter=ALL" >> "$GITHUB_OUTPUT"
            echo "reason=premier push sur la branche ou commit base introuvable" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Fichiers globaux : invalident le cache (regrade complet)
          if git diff --name-only "$BEFORE" HEAD -- \
              pom.xml \
              '.github/workflows/**' \
              '*.sh' \
              'src/main/java/fr/univ_amu/iut/App.java' \
              'src/main/java/fr/univ_amu/iut/module-info.java' \
              'src/test/java/fr/univ_amu/iut/AppTest.java' \
              | grep -q .; then
            echo "filter=ALL" >> "$GITHUB_OUTPUT"
            echo "reason=fichier global modifié (pom.xml / App / workflows / scripts)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Détection fine : paquets exerciceN / bonusN modifiés
          pkgs=$(git diff --name-only "$BEFORE" HEAD -- \
              'src/main/java/fr/univ_amu/iut/exercice*/**' \
              'src/test/java/fr/univ_amu/iut/exercice*/**' \
              'src/main/java/fr/univ_amu/iut/bonus*/**' \
              'src/test/java/fr/univ_amu/iut/bonus*/**' \
              | grep -oE 'fr/univ_amu/iut/(exercice[0-9]+|bonus[0-9]+)' \
              | sort -u | tr '/' '.')
          if [ -z "$pkgs" ]; then
            echo "filter=NONE" >> "$GITHUB_OUTPUT"
            echo "reason=aucune source d'exercice modifiée (mvnw test sauté, scores restaurés du cache)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Énumère les classes de test des paquets impactés (FQCN explicites)
          classes=""
          for pkg in $pkgs; do
            pkg_dir="src/test/java/$(echo "$pkg" | tr '.' '/')"
            while IFS= read -r f; do
              cls=$(basename "$f" .java)
              classes="${classes}${classes:+,}${pkg}.${cls}"
            done < <(find "$pkg_dir" -type f -name '*.java' 2>/dev/null)
          done
          if [ -z "$classes" ]; then
            echo "filter=NONE" >> "$GITHUB_OUTPUT"
            echo "reason=paquets modifiés mais aucune classe de test trouvée" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "filter=$classes" >> "$GITHUB_OUTPUT"
          echo "reason=paquets impactés : $(echo $pkgs | tr '\\n' ' ')" >> "$GITHUB_OUTPUT"

      - name: Lancer les tests impactés
        id: run_tests
        if: steps.scope.outputs.filter != 'NONE'
        continue-on-error: true
        run: |
          echo "Scope : ${{ steps.scope.outputs.reason }}"
          if [ "${{ steps.scope.outputs.filter }}" = "ALL" ]; then
            ./mvnw -B test -DfailIfNoTests=false
          else
            ./mvnw -B test -Dtest='${{ steps.scope.outputs.filter }}' -DfailIfNoTests=false
          fi


      - name: "exercice1 : au_demarrage_l_apercu_reflete_le_texte_initial"
        id: exercice1_au_demarrage_l_apercu_reflete_le_texte_initial
        uses: IUTInfoAix-R202/autograding-command-grader@main
